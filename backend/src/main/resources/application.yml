spring:
  config:
    import: "optional:file:.env[.properties]"
  application:
    name: invoice-platform

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER}

    hikari:
      data-source-properties:
        preferQueryMode: simple
        prepareThreshold: 0
    
  data:
      redis:
        url: ${REDIS_HOST_URL}
        # port: ${REDIS_PORT}
        # password: ${REDIS_PASSWORD}
        ssl:
          enabled: true
        lettuce:
          pool:
            max-active: 8
            max-idle: 8
            min-idle: 0
            max-wait: -1ms

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT}
        format_sql: true
        jdbc:
          batch_size: 20
    show-sql: ${JPA_SHOW_SQL}

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE}
      max-request-size: ${MAX_REQUEST_SIZE}

  web:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS}
      allowed-methods: ${CORS_ALLOWED_METHODS}
      allowed-headers: ${CORS_ALLOWED_HEADERS}
      allow-credentials: true
      max-age: 3600

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT}
          timeout: ${MAIL_SMTP_TIMEOUT}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT}

app:
  name: ${APP_NAME}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  swagger:
    enabled: ${SWAGGER_ENABLED:false}

server:
  port: ${SERVER_PORT}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

springdoc:
  swagger-ui:
    path: ${SWAGGER_PATH}
    enabled: ${SWAGGER_ENABLED}
  api-docs:
    path: ${APIDOCS_PATH}
    enabled: ${APIDOCS_ENABLED}

logging:
  level:
    root: ${LOG_LEVEL_ROOT}
    com.microsaas.invoice: ${LOG_LEVEL_APP}
  file:
    name: ${LOG_FILE_NAME}
    max-size: ${LOG_MAX_SIZE}
    max-history: ${LOG_MAX_HISTORY}

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: always

  health:
    mail:
      enabled: false
